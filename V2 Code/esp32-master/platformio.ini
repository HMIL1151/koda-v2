; Koda V2 — ESP32 master controller
; Arduino-ESP32 framework + Bluepad32 for PS4/DS4 input over BLE.
;
;   pio run              build
;   pio run -t upload    flash
;   pio device monitor   serial logs (115200)
;
; Bluepad32 needs a custom arduino-esp32 build (it patches the BT stack to be a BLE/HID
; *host*). The `platform_packages` line below follows Bluepad32's official PlatformIO
; template — if the build can't fetch the package, copy the current values from:
;   https://github.com/ricardoquesada/bluepad32/blob/main/examples/platformio/platformio.ini
; Versions there move over time; that file is the source of truth.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board    = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; LittleFS holds the hall-sensor calibration JSON (default esp32dev partition has a
; spiffs/littlefs region, so no custom partition table is needed).
board_build.filesystem = littlefs

; Bluepad32-flavoured arduino-esp32 core + the Bluepad32 library.
platform_packages =
    framework-arduinoespressif32 @ https://github.com/ricardoquesada/esp32-arduino-lib-builder/releases/latest/download/framework-arduinoespressif32-bluepad32.zip

lib_deps =
    https://github.com/ricardoquesada/bluepad32.git
    bblanchon/ArduinoJson @ ^7.0.0          ; hall-cal JSON persistence
    adafruit/Adafruit ADS1X15 @ ^2.4.0      ; external I2C ADC for the 8 hall sensors
    adafruit/Adafruit BusIO @ ^1.14.0       ; ADS1X15 dependency

build_flags =
    -std=gnu++17
    -Wall
    -Iinclude
    -Isrc                 ; quoted includes like "math/vec.h" resolve from src/
    -DCORE_DEBUG_LEVEL=3

build_unflags =
    -std=gnu++11
