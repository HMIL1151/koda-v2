<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="ahG" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2ecc71"/></marker>
    <marker id="ahY" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f1c40f"/></marker>
    <marker id="ahW" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8fa5b5"/></marker>
    <marker id="ahflow" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#3a5572"/></marker>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ecc71"/><stop offset="0.5" stop-color="#e6a23c"/><stop offset="1" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>

  <rect width="980" height="720" fill="#0f0f1a"/>
  <text x="490" y="34" text-anchor="middle" fill="#ecf0f1" font-size="21" font-weight="700">Estimating ground angle from 4 spring compressions</text>
  <text x="490" y="56" text-anchor="middle" fill="#7f8c8d" font-size="13">Infer mode · the only inputs are the four calf-spring compressions</text>

  <!-- flow arrows between panels -->
  <line x1="247" y1="225" x2="262" y2="225" stroke="#3a5572" stroke-width="3" marker-end="url(#ahflow)"/>
  <line x1="487" y1="225" x2="502" y2="225" stroke="#3a5572" stroke-width="3" marker-end="url(#ahflow)"/>
  <line x1="727" y1="225" x2="742" y2="225" stroke="#3a5572" stroke-width="3" marker-end="url(#ahflow)"/>

  <!-- ============ Panel 1: inputs ============ -->
  <g>
    <rect x="18" y="74" width="222" height="300" rx="9" fill="#141428" stroke="#1e2d3d"/>
    <text x="34" y="100" fill="#2ecc71" font-size="15" font-weight="700">1 · Spring readings</text>
    <!-- four compression bars -->
    <g transform="translate(40,120)">
      <!-- tracks -->
      <g fill="#22283a">
        <rect x="0"   y="0" width="24" height="150" rx="6"/>
        <rect x="38"  y="0" width="24" height="150" rx="6"/>
        <rect x="110" y="0" width="24" height="150" rx="6"/>
        <rect x="148" y="0" width="24" height="150" rx="6"/>
      </g>
      <!-- compressed fill (from bottom) -->
      <rect x="0"   y="58"  width="24" height="92"  rx="6" fill="#2ecc71"/>
      <rect x="38"  y="98"  width="24" height="52"  rx="6" fill="#7fcf9b"/>
      <rect x="110" y="34"  width="24" height="116" rx="6" fill="#e6a23c"/>
      <rect x="148" y="80"  width="24" height="70   " rx="6" fill="#8fcf9b"/>
      <g fill="#ecf0f1" font-size="12" text-anchor="middle" font-family="monospace">
        <text x="12"  y="168">flF</text><text x="50"  y="168">flR</text>
        <text x="122" y="168">rlF</text><text x="160" y="168">rlR</text>
      </g>
      <text x="31"  y="186" fill="#5d6d7e" font-size="11" text-anchor="middle">front leg</text>
      <text x="141" y="186" fill="#5d6d7e" font-size="11" text-anchor="middle">rear leg</text>
    </g>
    <text x="34" y="346" fill="#8fa5b5" font-size="11.5">Four compressions cᵢ (mm),</text>
    <text x="34" y="362" fill="#8fa5b5" font-size="11.5">the only sensed quantity.</text>
  </g>

  <!-- ============ Panel 2: leg forces + foot ============ -->
  <g>
    <rect x="255" y="74" width="222" height="300" rx="9" fill="#141428" stroke="#1e2d3d"/>
    <text x="271" y="100" fill="#2ecc71" font-size="15" font-weight="700">2 · Leg → force + foot</text>
    <g transform="translate(255,74)">
      <!-- torso piece -->
      <line x1="58" y1="92" x2="150" y2="92" stroke="#34495e" stroke-width="7" stroke-linecap="round"/>
      <!-- thighs -->
      <line x1="72" y1="92" x2="62" y2="132" stroke="#4a6480" stroke-width="4"/>
      <line x1="136" y1="92" x2="146" y2="132" stroke="#4a6480" stroke-width="4"/>
      <!-- calves -->
      <line x1="62" y1="132" x2="104" y2="190" stroke="#7f8c8d" stroke-width="3"/>
      <line x1="146" y1="132" x2="104" y2="190" stroke="#7f8c8d" stroke-width="3"/>
      <!-- calf force arrows (toward foot) -->
      <line x1="80" y1="158" x2="99" y2="183" stroke="#2ecc71" stroke-width="2" marker-end="url(#ahG)"/>
      <line x1="128" y1="158" x2="109" y2="183" stroke="#2ecc71" stroke-width="2" marker-end="url(#ahG)"/>
      <!-- joints -->
      <circle cx="72" cy="92" r="3.5" fill="#95a5a6"/><circle cx="136" cy="92" r="3.5" fill="#95a5a6"/>
      <circle cx="62" cy="132" r="4" fill="#e67e22"/><circle cx="146" cy="132" r="4" fill="#e67e22"/>
      <circle cx="104" cy="190" r="5" fill="#e74c3c"/>
      <!-- resultant reaction R -->
      <line x1="104" y1="190" x2="104" y2="150" stroke="#2ecc71" stroke-width="3" marker-end="url(#ahG)"/>
      <text x="112" y="162" fill="#2ecc71" font-size="13" font-style="italic">R</text>
      <text x="34" y="130" fill="#e67e22" font-size="11">knee</text>
      <text x="110" y="202" fill="#e74c3c" font-size="11">foot</text>
    </g>
    <text x="271" y="322" fill="#8fa5b5" font-size="11.5">Fᵢ = k·cᵢ along each calf</text>
    <text x="271" y="338" fill="#8fa5b5" font-size="11.5">(clamped at the end stops).</text>
    <text x="271" y="358" fill="#8fa5b5" font-size="11.5">Foot via forward kinematics.</text>
  </g>

  <!-- ============ Panel 3: net reaction vertical ============ -->
  <g>
    <rect x="495" y="74" width="222" height="300" rx="9" fill="#141428" stroke="#1e2d3d"/>
    <text x="511" y="100" fill="#2ecc71" font-size="15" font-weight="700">3 · Net = gravity ↑</text>
    <g transform="translate(495,74)">
      <!-- vertical reference -->
      <line x1="118" y1="210" x2="118" y2="108" stroke="#5d6d7e" stroke-width="1" stroke-dasharray="3 4"/>
      <text x="118" y="102" fill="#7f8c8d" font-size="10.5" text-anchor="middle">vertical</text>
      <!-- tilted torso -->
      <line x1="55" y1="146" x2="165" y2="126" stroke="#34495e" stroke-width="7" stroke-linecap="round"/>
      <!-- two leg reaction arrows -->
      <line x1="82" y1="196" x2="94" y2="158" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#ahG)"/>
      <line x1="150" y1="192" x2="150" y2="156" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#ahG)"/>
      <text x="62" y="198" fill="#2ecc71" font-size="11">R_fl</text>
      <text x="156" y="190" fill="#2ecc71" font-size="11">R_rl</text>
      <!-- net reaction (vertical, bold) -->
      <line x1="118" y1="210" x2="118" y2="138" stroke="#2ecc71" stroke-width="4" marker-end="url(#ahG)"/>
      <text x="125" y="160" fill="#2ecc71" font-size="13" font-weight="700">R_net</text>
    </g>
    <text x="511" y="300" fill="#8fa5b5" font-size="11.5">At equilibrium R_net must</text>
    <text x="511" y="316" fill="#8fa5b5" font-size="11.5">balance gravity → points up.</text>
    <text x="511" y="332" fill="#8fa5b5" font-size="11.5">Rotate body so it does ⇒ φ:</text>
    <text x="511" y="356" fill="#ecf0f1" font-size="11.5" font-family="monospace">φ = −90° − atan2(Ry,Rx)</text>
  </g>

  <!-- ============ Panel 4: ground angle ============ -->
  <g>
    <rect x="729" y="74" width="233" height="300" rx="9" fill="#141428" stroke="#1e2d3d"/>
    <text x="745" y="100" fill="#2ecc71" font-size="15" font-weight="700">4 · Ground = feet line</text>
    <g transform="translate(729,74)">
      <!-- horizontal reference -->
      <line x1="30" y1="190" x2="205" y2="190" stroke="#5d6d7e" stroke-width="1" stroke-dasharray="4 5"/>
      <!-- feet line (tilted) -->
      <line x1="40" y1="168" x2="196" y2="214" stroke="#27ae60" stroke-width="3"/>
      <circle cx="60" cy="174" r="6" fill="#e74c3c"/>
      <circle cx="176" cy="208" r="6" fill="#e74c3c"/>
      <text x="52" y="160" fill="#e74c3c" font-size="11">front foot</text>
      <text x="150" y="228" fill="#e74c3c" font-size="11">rear foot</text>
      <!-- angle arc -->
      <path d="M 70 190 A 30 30 0 0 1 78.6 211" fill="none" stroke="#f1c40f" stroke-width="1.6"/>
      <text x="82" y="206" fill="#f1c40f" font-size="14" font-weight="700">θ</text>
    </g>
    <text x="745" y="296" fill="#8fa5b5" font-size="11.5">Rotate the foot positions by</text>
    <text x="745" y="312" fill="#8fa5b5" font-size="11.5">φ into the world. The line</text>
    <text x="745" y="328" fill="#8fa5b5" font-size="11.5">through the two feet is the</text>
    <text x="745" y="344" fill="#8fa5b5" font-size="11.5">ground. θ = its tilt — the</text>
    <text x="745" y="360" fill="#2ecc71" font-size="11.5" font-weight="700">estimated ground angle.</text>
  </g>

  <!-- ============ Confidence panel ============ -->
  <g>
    <rect x="18" y="400" width="944" height="296" rx="9" fill="#10171f" stroke="#27406040"/>
    <text x="36" y="430" fill="#f1c40f" font-size="16" font-weight="700">Confidence — is this a physically real stance?</text>
    <text x="36" y="452" fill="#8fa5b5" font-size="12.5">The geometry returns an angle for any 4 numbers, so we grade it by whether the load is a valid standing balance.</text>

    <!-- left: CoP diagram -->
    <g transform="translate(60,470)">
      <text x="120" y="6" fill="#7f8c8d" font-size="12" text-anchor="middle">centre of pressure between the feet</text>
      <!-- ground line -->
      <line x1="0" y1="150" x2="240" y2="150" stroke="#27ae60" stroke-width="3"/>
      <circle cx="30" cy="150" r="7" fill="#e74c3c"/><text x="30" y="176" fill="#7f8c8d" font-size="11" text-anchor="middle">front</text>
      <circle cx="210" cy="150" r="7" fill="#e74c3c"/><text x="210" y="176" fill="#7f8c8d" font-size="11" text-anchor="middle">rear</text>
      <!-- per-foot load arrows up -->
      <line x1="30" y1="150" x2="30" y2="108" stroke="#2ecc71" stroke-width="3" marker-end="url(#ahG)"/>
      <text x="14" y="104" fill="#2ecc71" font-size="11">L_f</text>
      <line x1="210" y1="150" x2="210" y2="92" stroke="#2ecc71" stroke-width="3" marker-end="url(#ahG)"/>
      <text x="216" y="92" fill="#2ecc71" font-size="11">L_r</text>
      <!-- CoM + weight down -->
      <circle cx="132" cy="40" r="6" fill="#f1c40f"/><text x="142" y="44" fill="#f1c40f" font-size="11">CoM</text>
      <line x1="132" y1="46" x2="132" y2="150" stroke="#f1c40f" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#ahY)"/>
      <!-- CoP tick -->
      <line x1="132" y1="144" x2="132" y2="156" stroke="#ffffff" stroke-width="2"/>
      <text x="132" y="172" fill="#cfd8dc" font-size="11" text-anchor="middle">CoP</text>
    </g>

    <!-- right: formula + rules -->
    <g transform="translate(360,470)">
      <rect x="0" y="-12" width="560" height="40" rx="6" fill="#141428" stroke="#1e2d3d"/>
      <text x="16" y="14" fill="#ecf0f1" font-size="14" font-family="monospace">confidence = 2 · min(L_f, L_r) / (L_f + L_r)</text>

      <!-- gradient bar -->
      <rect x="0" y="44" width="560" height="12" rx="6" fill="url(#grad)"/>
      <text x="0" y="78" fill="#2ecc71" font-size="11.5">100% — load centred (very stable)</text>
      <text x="560" y="78" fill="#e74c3c" font-size="11.5" text-anchor="end">0% — load over one foot (edge of tipping)</text>

      <!-- rules -->
      <g font-size="12.5">
        <circle cx="6" cy="108" r="4" fill="#e74c3c"/>
        <text x="20" y="112" fill="#cfd8dc">A foot carries no load (L ≤ 0) → 0%: it would have to be pulled down — the robot tips.</text>
        <circle cx="6" cy="134" r="4" fill="#e74c3c"/>
        <text x="20" y="138" fill="#cfd8dc">No net support (R_net ≈ 0) → 0%: the readings don't describe a stance.</text>
        <circle cx="6" cy="160" r="4" fill="#e6a23c"/>
        <text x="20" y="164" fill="#cfd8dc">Any spring at an end stop → capped at 20%: its force F = k·c is saturated,</text>
        <text x="20" y="180" fill="#8fa5b5">so the reaction direction — and the whole estimate — rests on a wrong value.</text>
      </g>
    </g>
  </g>
</svg>
